<!DOCTYPE html>
<html>
<head>
    <title>AI Chef 🍳</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 h-screen flex flex-col">

<!-- Header -->
<div class="bg-white shadow p-4 text-center font-bold text-xl">
    👨‍🍳 AI Chef Assistant
</div>

<!-- Chat container -->
<div class="flex-1 overflow-y-auto p-4 space-y-3">

    {% for msg in history %}

        {% if msg.type == "human" %}
        <!-- USER MESSAGE -->
        <div class="flex justify-end">
            <div class="bg-blue-500 text-white p-3 rounded-2xl max-w-xs shadow">
                {{ msg.content }}
            </div>
        </div>

        {% else %}
        <!-- CHEF MESSAGE -->
        <div class="flex justify-start">
            <div class="bg-white p-3 rounded-2xl max-w-md shadow">
                🍳 {{ msg.content }}
            </div>
        </div>
        {% endif %}

    {% endfor %}

</div>

<!-- Input area -->
<form method="POST" class="p-4 bg-white flex gap-2 shadow">
    {% csrf_token %}

    <input
        type="text"
        name="ingredients"
        placeholder="Type ingredients..."
        class="flex-1 border rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-blue-400"
    >

    <button
        class="bg-blue-500 text-white px-5 py-2 rounded-xl hover:bg-blue-600"
    >
        Send
    </button>
</form>

</body>
</html>
