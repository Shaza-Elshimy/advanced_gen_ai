<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex justify-center items-center min-h-screen">

<div class="w-full max-w-2xl bg-white shadow-xl rounded-2xl p-6">

  <h1 class="text-2xl font-bold mb-4 text-center text-blue-600">
    📚 MySQL RAG Assistant
  </h1>

  <!-- chat box -->
  <div id="chat" class="h-96 overflow-y-auto border p-3 rounded-lg mb-4 bg-gray-50">
  </div>

  <!-- input -->
  <div class="flex gap-2">
    <input id="q"
           class="flex-1 border rounded-lg p-2"
           placeholder="Ask about MySQL..." />

    <button onclick="ask()"
            class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600">
      Send
    </button>
  </div>

</div>

<script>
async function ask() {
    let q = document.getElementById("q").value;

    let res = await fetch(`/rag?q=${q}`);
    let data = await res.json();

    let chat = document.getElementById("chat");

    chat.innerHTML += `
      <div class="text-right mb-2">
        <div class="bg-blue-100 p-2 rounded-lg inline-block">
          ❓ ${q}
        </div>
      </div>

      <div class="text-left mb-4">
        <div class="bg-gray-200 p-2 rounded-lg inline-block">
          🤖 ${data.answer}
        </div>
      </div>
    `;

    document.getElementById("q").value = "";
}
</script>

</body>
</html>
